name: Build smile PNG

on:
  push:
    paths:
      - smile.png.b64
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Decode PNG
        shell: bash
        run: base64 -d smile.png.b64 > images/smile.png
      - name: Commit PNG
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add images/smile.png
          git diff --cached --quiet || git commit -m "Generate smile PNG"
          git push
