<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ChatGPT Reaction Images</title>
  <style>
    :root { color-scheme: dark; font-family: system-ui, sans-serif; }
    body { max-width: 920px; margin: 0 auto; padding: 32px 20px; background: #111827; color: #f3f4f6; }
    h1 { margin-bottom: 8px; }
    p { color: #cbd5e1; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(180px,1fr)); gap: 16px; margin-top: 28px; }
    article { padding: 18px; border: 1px solid #334155; border-radius: 14px; background: #1e293b; }
    img { display: block; width: 128px; height: 128px; margin: 0 auto 12px; object-fit: contain; }
    code { font-size: 12px; color: #93c5fd; overflow-wrap: anywhere; }
  </style>
</head>
<body>
  <h1>ChatGPT Reaction Images</h1>
  <p>パーソナライズ用リアクション画像の公開URL一覧。</p>
  <main class="grid" id="grid"></main>
  <script>
    const images = [
      ['smile', '笑顔'], ['thumbs-up', '励まし・勇気づけ'], ['laugh', 'おどけ'], ['think', '思案'],
      ['surprise', '驚き'], ['smug', 'ドヤ'], ['angry', '怒り'],
      ['calm', '落ち着き'], ['sad', '同情']
    ];
    const base = `${location.origin}${location.pathname}images/`;
    document.querySelector('#grid').innerHTML = images.map(([file, label]) =>
      `<article><img src="images/${file === 'smile' ? 'smile.svg' : `${file}.png`}" alt="${label}"><strong>${label}</strong><br><code>![image](${base}${file === 'smile' ? 'smile.svg' : `${file}.png`})</code></article>`
    ).join('');
  </script>
</body>
</html>
